name: Mooring Weather Watch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Check wind limits
        env:
          USER_AGENT: "mooring-weather-watch/1.0 nick@enjoyneering.dk"
        run: python monitor.py
